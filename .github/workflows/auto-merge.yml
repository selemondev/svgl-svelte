name: Auto-merge svgl PRs
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
jobs:
  guard:
    if: startsWith(github.head_ref, 'update-svgl-svelte-components') && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify PR only touches allowed paths
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Files changed in this PR:"
          echo "$CHANGED"
          echo ""
          BAD=$(echo "$CHANGED" | grep -v -E '^(src/lib/components/.*\.svelte|src/lib/index\.ts)$' || true)
          if [ -n "$BAD" ]; then
            echo "❌ PR touches files outside src/lib/components/*.svelte:"
            echo "$BAD"
            exit 1
          fi
          echo "✅ All changes confined to src/lib/components/*.svelte"
  merge:
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Enable auto-merge
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto --delete-branch --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.SVGL_SVELTE_AUTOMATION_TOKEN }}
