name: Tag release
on:
  push:
    branches: [main]
    paths:
      - 'src/lib/components/**'
      - 'src/lib/index.ts'

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SVGL_SVELTE_AUTOMATION_TOKEN }}

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release
        run: pnpm generate:release
        env:
          GITHUB_TOKEN: ${{ secrets.SVGL_SVELTE_AUTOMATION_TOKEN }}
